[isort]
include_trailing_comma = True
indent = '    '
line_length = 120
multi_line_output = 3
skip=
    migrations

[wheel]
universal = 1

[mypy]
python_version = 3.12
ignore_missing_imports = True
check_untyped_defs = False
warn_unused_ignores = True
exclude = (^docs/|^build/|^dist/)

[mypy-xapi_db_load.tests.*]
ignore_errors = True
